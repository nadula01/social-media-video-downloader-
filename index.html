<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Downloader</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0b0f19; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: radial-gradient(circle at top left, #0e201b, #0b0f19 50%); }
        .container { background-color: #111827; padding: 40px; border-radius: 12px; width: 100%; max-width: 550px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 1px solid #1f2937; }
        h1 { font-size: 24px; color: #10b981; margin-bottom: 30px; letter-spacing: 1px; text-transform: uppercase; }
        .input-group { position: relative; margin-bottom: 20px; }
        input { width: 100%; padding: 15px 20px; background-color: #1f2937; border: 1px solid #374151; border-radius: 8px; color: #fff; font-size: 14px; outline: none; transition: all 0.3s; }
        input:focus { border-color: #10b981; box-shadow: 0 0 10px rgba(16, 185, 129, 0.2); }
        button { width: 100%; padding: 15px; background-color: #00ff66; border: none; border-radius: 8px; color: #000; font-size: 16px; font-weight: bold; cursor: pointer; transition: all 0.3s; box-shadow: 0 4px 15px rgba(0, 255, 102, 0.3); }
        button:hover { background-color: #00dd55; }
        .result-box { margin-top: 30px; padding: 20px; background-color: #1f2937; border-radius: 8px; display: none; text-align: left; }
        .thumb { width: 100%; border-radius: 6px; margin-bottom: 15px; }
        .title { font-size: 16px; font-weight: 600; margin-bottom: 15px; color: #f3f4f6; }
        .download-btn { display: inline-block; width: 100%; text-align: center; padding: 12px; background-color: #10b981; color: #fff; text-decoration: none; border-radius: 6px; font-weight: 600; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Video Downloader</h1>
    <div class="input-group">
        <input type="text" id="videoUrl" placeholder="Paste any video or audio link here...">
    </div>
    <button id="btn" onclick="fetchVideo()"><i class="fas fa-arrow-right"></i> Next</button>

    <div class="result-box" id="resultBox">
        <img src="" id="videoThumb" class="thumb" alt="Thumbnail">
        <div class="title" id="videoTitle">Video Title</div>
        <a href="" id="downloadLink" class="download-btn" target="_blank"><i class="fas fa-download"></i> Download Video</a>
    </div>
</div>

<script>
async function fetchVideo() {
    const url = document.getElementById('videoUrl').value;
    const btn = document.getElementById('btn');
    const resultBox = document.getElementById('resultBox');
    
    if(!url) { alert('Please paste a link!'); return; }
    
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Loading Details...';
    btn.disabled = true;
    resultBox.style.display = 'none';

    try {
        const response = await fetch('/api/info', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url: url })
        });
        
        const data = await response.json();
        
        if(data.error) {
            alert('Error: ' + data.error);
            btn.innerHTML = 'Next';
            btn.disabled = false;
            return;
        }
        
        document.getElementById('videoThumb').src = data.thumbnail || 'https://via.placeholder.com/150';
        document.getElementById('videoTitle').innerText = data.title;
        
        // Render එකෙන් එන සෘජු වීඩියෝ ලින්ක් එක දීම
        document.getElementById('downloadLink').href = url; 
        
        resultBox.style.display = 'block';
    } catch (error) {
        alert('Something went wrong. Please try again.');
    } finally {
        btn.innerHTML = 'Next';
        btn.disabled = false;
    }
}
</script>

</body>
</html>
