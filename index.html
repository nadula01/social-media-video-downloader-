```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Video Downloader</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
background:#07090f;
overflow-x:hidden;
}

body::before{
content:'';
position:fixed;
width:500px;
height:500px;
background:#00ff6630;
filter:blur(200px);
top:-150px;
left:-150px;
z-index:-1;
}

body::after{
content:'';
position:fixed;
width:500px;
height:500px;
background:#00bfff25;
filter:blur(200px);
bottom:-150px;
right:-150px;
z-index:-1;
}

.container{
width:100%;
max-width:600px;
background:rgba(18,18,25,.85);
border:1px solid rgba(255,255,255,.08);
backdrop-filter:blur(20px);
padding:35px;
border-radius:24px;
box-shadow:0 25px 60px rgba(0,0,0,.4);
animation:fadeIn .5s ease;
}

.logo{
text-align:center;
margin-bottom:25px;
}

.logo h1{
font-size:32px;
font-weight:700;
background:linear-gradient(90deg,#ffffff,#00ff88);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.logo p{
color:#8b8b96;
font-size:14px;
margin-top:8px;
}

.input-wrapper{
display:flex;
gap:10px;
margin-bottom:18px;
}

.input-wrapper input{
flex:1;
height:55px;
background:#11151f;
border:1px solid #262b36;
border-radius:14px;
padding:0 18px;
color:white;
font-size:15px;
transition:.3s;
}

.input-wrapper input:focus{
outline:none;
border-color:#00ff88;
box-shadow:0 0 20px rgba(0,255,136,.15);
}

.paste-btn{
height:55px;
padding:0 18px;
border:none;
border-radius:14px;
background:#1d2430;
color:white;
font-weight:600;
cursor:pointer;
transition:.3s;
}

.paste-btn:hover{
background:#283242;
}

.main-btn{
width:100%;
height:58px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#00ff88,#00d46f);
color:black;
font-size:16px;
font-weight:700;
cursor:pointer;
transition:.3s;
}

.main-btn:hover{
transform:translateY(-2px);
}

.main-btn:active{
transform:scale(.98);
}

.features{
margin-top:25px;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
}

.feature{
background:#10141c;
padding:15px;
border-radius:14px;
text-align:center;
border:1px solid rgba(255,255,255,.05);
}

.feature h4{
font-size:14px;
color:white;
margin-top:8px;
}

.feature span{
font-size:24px;
}

.preview{
margin-top:25px;
display:none;
animation:fadeIn .4s ease;
}

.preview img{
width:100%;
border-radius:16px;
margin-bottom:15px;
}

.video-title{
font-size:17px;
font-weight:600;
line-height:1.5;
margin-bottom:20px;
}

.download-btn{
width:100%;
height:55px;
border:none;
border-radius:14px;
background:#00ff88;
color:black;
font-weight:700;
cursor:pointer;
}

.loader{
width:20px;
height:20px;
border:3px solid rgba(0,0,0,.2);
border-top:3px solid black;
border-radius:50%;
animation:spin .8s linear infinite;
display:inline-block;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(15px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@media(max-width:600px){

.container{
padding:20px;
border-radius:20px;
}

.logo h1{
font-size:26px;
}

.input-wrapper{
flex-direction:column;
}

.paste-btn{
width:100%;
}

.features{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<div class="container">

<div class="logo">
<h1>VIDEO DOWNLOADER</h1>
<p>Download videos quickly and easily</p>
</div>

<div id="step1">

<div class="input-wrapper">
<input type="text" id="video-url" placeholder="Paste video link here...">
<button class="paste-btn" onclick="pasteUrl()">📋 Paste</button>
</div>

<button class="main-btn" onclick="fetchVideo()">
Get Video
</button>

<div class="features">

<div class="feature">
<span>⚡</span>
<h4>Fast</h4>
</div>

<div class="feature">
<span>📱</span>
<h4>Mobile Ready</h4>
</div>

<div class="feature">
<span>🎬</span>
<h4>HD Quality</h4>
</div>

</div>

</div>

<div class="preview" id="preview">

<img id="thumbnail">

<div class="video-title" id="title">
Video Title
</div>

<button class="download-btn">
Download
</button>

</div>

</div>

<script>

async function pasteUrl(){
try{
const text = await navigator.clipboard.readText();
document.getElementById("video-url").value=text;
}
catch(err){
alert("Clipboard permission denied");
}
}

async function fetchVideo(){

const url=document.getElementById("video-url").value;

if(!url){
alert("Paste a video link first");
return;
}

const btn=document.querySelector(".main-btn");

btn.innerHTML='<span class="loader"></span>';
btn.disabled=true;

setTimeout(()=>{

document.getElementById("preview").style.display="block";

document.getElementById("thumbnail").src=
"https://via.placeholder.com/800x450";

document.getElementById("title").innerText=
"Video Preview Example";

btn.innerHTML="Get Video";
btn.disabled=false;

},1500);

}

</script>

</body>
</html>
