<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Video Downloader</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{

background:#070707;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
overflow-x:hidden;

}

body::before{

content:"";
position:fixed;
width:450px;
height:450px;
background:#00ff66;
filter:blur(220px);
opacity:.18;
left:-150px;
top:-100px;

}

body::after{

content:"";
position:fixed;
width:350px;
height:350px;
background:#00ff66;
filter:blur(220px);
opacity:.15;
right:-100px;
bottom:-100px;

}

.container{

width:95%;
max-width:650px;

background:#111;

border:1px solid #222;

border-radius:20px;

padding:35px;

box-shadow:0 0 40px rgba(0,255,100,.08);

backdrop-filter:blur(10px);

animation:fade .5s;

}

@keyframes fade{

from{

opacity:0;
transform:translateY(20px);

}

to{

opacity:1;
transform:translateY(0);

}

}

h2{

text-align:center;

margin-bottom:30px;

font-size:32px;

background:linear-gradient(90deg,#fff,#00ff66);

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

}

.input-box{

display:flex;

gap:10px;

margin-bottom:20px;

}

input{

flex:1;

background:#181818;

border:1px solid #2b2b2b;

padding:15px;

border-radius:12px;

color:white;

font-size:15px;

outline:none;

transition:.3s;

}

input:focus{

border-color:#00ff66;

box-shadow:0 0 20px rgba(0,255,100,.25);

}

button{

cursor:pointer;

border:none;

border-radius:12px;

padding:14px 18px;

font-weight:600;

transition:.3s;

}

#pasteBtn{

background:#242424;

color:white;

}

#pasteBtn:hover{

background:#2f2f2f;

}

#nextBtn{

width:100%;

background:#00ff66;

color:#000;

font-size:16px;

margin-top:5px;

}

#nextBtn:hover{

transform:translateY(-2px);

box-shadow:0 0 20px rgba(0,255,100,.35);

}

.hidden{

display:none;

}

#videoCard{

margin-top:20px;

}

#thumbnail{

width:100%;

border-radius:15px;

margin-bottom:20px;

}

.title{

font-size:18px;

font-weight:600;

margin-bottom:5px;

}

.meta{

font-size:14px;

color:#aaa;

margin-bottom:25px;

}

.tabs{

display:flex;

gap:10px;

margin-bottom:20px;

}

.tabs button{

flex:1;

background:#191919;

color:#999;

}

.tabs button.active{

background:#00ff66;

color:black;

}

table{

width:100%;

border-collapse:collapse;

}

tr{

border-bottom:1px solid #222;

}

td{

padding:14px;

}

.downloadBtn{

background:#00ff66;

color:black;

padding:10px 18px;

}

.downloadBtn:hover{

transform:scale(1.05);

}

.progress{

width:100%;

height:9px;

background:#1a1a1a;

border-radius:20px;

overflow:hidden;

margin-top:20px;

display:none;

}

.bar{

height:100%;

width:0%;

background:#00ff66;

transition:.3s;

}

.status{

margin-top:15px;

font-size:14px;

color:#bbb;

text-align:center;

}

.toast{

position:fixed;

bottom:30px;

left:50%;

transform:translateX(-50%);

background:#00ff66;

color:black;

padding:14px 22px;

border-radius:10px;

display:none;

font-weight:600;

}

@media(max-width:600px){

.container{

padding:20px;

}

.input-box{

flex-direction:column;

}

}

</style>
</head>

<body>

<div class="container">

<h2>VIDEO DOWNLOADER</h2>

<div id="step1">

<div class="input-box">

<input
id="url"
type="text"
placeholder="Paste YouTube / Facebook / TikTok / Instagram Link">

<button id="pasteBtn">

📋 Paste

</button>

</div>

<button id="nextBtn">

Next →

</button>

</div>

<div id="step2" class="hidden">

<img id="thumbnail">

<div class="title" id="title"></div>

<div class="meta">

<span id="channel"></span>

•

<span id="duration"></span>

</div>

<div class="tabs">

<button class="active" id="videoTab">

Video

</button>

<button id="audioTab">

Audio

</button>

</div>

<table>

<tbody id="qualityTable">

</tbody>

</table>

<div class="progress">

<div class="bar"></div>

</div>

<div class="status">

Waiting...

</div>

</div>

</div>

<div class="toast"></div>

<script>

const API = "";

let currentFormats = [];
let currentTab = "video";

const urlInput = document.getElementById("url");
const pasteBtn = document.getElementById("pasteBtn");
const nextBtn = document.getElementById("nextBtn");

const step1 = document.getElementById("step1");
const step2 = document.getElementById("step2");

const thumbnail = document.getElementById("thumbnail");
const title = document.getElementById("title");
const channel = document.getElementById("channel");
const duration = document.getElementById("duration");

const table = document.getElementById("qualityTable");

const progress = document.querySelector(".progress");
const bar = document.querySelector(".bar");
const status = document.querySelector(".status");

const toast = document.querySelector(".toast");

const videoTab = document.getElementById("videoTab");
const audioTab = document.getElementById("audioTab");

function showToast(msg){

toast.innerHTML=msg;

toast.style.display="block";

setTimeout(()=>{

toast.style.display="none";

},2500);

}

pasteBtn.onclick=async()=>{

try{

const txt=await navigator.clipboard.readText();

urlInput.value=txt;

showToast("Link pasted");

}catch{

showToast("Clipboard permission denied");

}

};

urlInput.addEventListener("keypress",e=>{

if(e.key==="Enter"){

nextBtn.click();

}

});

nextBtn.onclick=async()=>{

const url=urlInput.value.trim();

if(url==""){

showToast("Paste a link first");

return;

}

nextBtn.disabled=true;

nextBtn.innerHTML="Loading...";

try{

const res=await fetch(API+"/api/info",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

url:url

})

});

const data=await res.json();

if(data.error){

showToast(data.error);

nextBtn.disabled=false;

nextBtn.innerHTML="Next →";

return;

}

thumbnail.src=data.thumbnail;

title.innerHTML=data.title;

channel.innerHTML=data.channel;

duration.innerHTML=formatDuration(data.duration);

currentFormats=data.formats;

step1.classList.add("hidden");

step2.classList.remove("hidden");

loadVideo();

}catch{

showToast("Server Error");

}

nextBtn.disabled=false;

nextBtn.innerHTML="Next →";

};

function formatDuration(sec){

sec=parseInt(sec);

let h=Math.floor(sec/3600);

let m=Math.floor((sec%3600)/60);

let s=sec%60;

if(h>0){

return h+":"+String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");

}

return m+":"+String(s).padStart(2,"0");

}

videoTab.onclick=()=>{

videoTab.classList.add("active");

audioTab.classList.remove("active");

loadVideo();

};

audioTab.onclick=()=>{

audioTab.classList.add("active");

videoTab.classList.remove("active");

loadAudio();

};

function loadVideo(){

table.innerHTML="";

const videos=currentFormats.filter(f=>f.type=="video");

videos.forEach(f=>{

table.innerHTML+=`

<tr>

<td><b>${f.quality}</b></td>

<td>${f.ext.toUpperCase()}</td>

<td>${f.size}</td>

<td>

<button

class="downloadBtn"

onclick="downloadFormat('${f.id}')">

Download

</button>

</td>

</tr>

`;

});

}

function loadAudio(){

table.innerHTML="";

const audios=currentFormats.filter(f=>f.type=="audio");

audios.forEach(f=>{

table.innerHTML+=`

<tr>

<td><b>${f.quality}</b></td>

<td>${f.ext.toUpperCase()}</td>

<td>${f.size}</td>

<td>

<button

class="downloadBtn"

onclick="downloadFormat('${f.id}')">

Download

</button>

</td>

</tr>

`;

});

}

function downloadFormat(id){

progress.style.display="block";

bar.style.width="0%";

status.innerHTML="Preparing...";

window.location=API+"/api/download?url="+encodeURIComponent(urlInput.value)+"&format="+id;

listenProgress();

}

function listenProgress(){

const eventSource=new EventSource("/progress");

eventSource.onmessage=function(e){

const d=JSON.parse(e.data);

bar.style.width=d.percent+"%";

status.innerHTML=

d.percent+"% • "+d.speed+" • ETA "+d.eta;

if(d.percent>=100){

status.innerHTML="Download Completed";

eventSource.close();

}

};

}

setInterval(()=>{

if(urlInput.value.includes("youtube")||

urlInput.value.includes("youtu.be")||

urlInput.value.includes("facebook")||

urlInput.value.includes("fb.watch")||

urlInput.value.includes("instagram")||

urlInput.value.includes("tiktok")){

nextBtn.disabled=false;

}else{

}

},500);

</script>

</body>
</html>
